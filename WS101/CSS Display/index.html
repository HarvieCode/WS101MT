<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Elements Recreation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #ffffff;
            color: #333;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 50px;
        }

        /* 1. Basic Inputs */
        .basic-inputs input {
            display: block;
            margin-bottom: 5px;
            padding: 4px;
            border: 1px solid #767676;
            width: 180px;
        }

        /* 2. Survey Box */
        .survey-box {
            background-color: #f1f1f1;
            padding: 15px;
            width: 400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }
        .survey-box button {
            padding: 5px 10px;
            margin-left: 5px;
            cursor: pointer;
            background: #fff;
            border: 1px solid #767676;
        }

        /* 3. Google Search Style */
        .google-section {
            text-align: center;
            margin-top: 20px;
        }
        .google-logo {
            font-size: 80px;
            font-weight: bold;
            font-family: 'Product Sans', Arial, sans-serif;
            margin-bottom: 20px;
        }
        .search-bar {
            width: 550px;
            padding: 12px 20px;
            border-radius: 24px;
            border: 1px solid #dfe1e5;
            outline: none;
            font-size: 16px;
        }
        .search-bar:hover {
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
        }

        /* 4. Sign Up Form */
        .signup-form {
            width: 300px;
        }
        .name-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .signup-form input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
        }
        .signup-form .full-width {
            margin-bottom: 15px;
        }
        .signup-btn {
            background-color: #4285f4;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        /* 5. Request a Ride */
        .ride-widget {
            background-color: #f6f6f6;
            padding: 20px;
            width: 350px;
        }
        .ride-widget h2 {
            margin-top: 0;
            font-size: 24px;
        }
        .ride-widget input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            background-color: #eeeeee;
            border: none;
            box-sizing: border-box;
        }
        .ride-buttons {
            display: flex;
            gap: 10px;
        }
        .btn-black {
            background: black;
            color: white;
            flex: 1;
            padding: 12px;
            border: none;
            cursor: pointer;
        }
        .btn-grey {
            background: #e2e2e2;
            color: black;
            flex: 1;
            padding: 12px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="basic-inputs">
        <input type="text" placeholder="Name">
        <input type="text" placeholder="Email">
    </div>

    <div class="survey-box">
        <div>Thanks for chatting with our customer support. Would you like to take our quick survey?</div>
        <div style="white-space: nowrap;">
            <button>Yes</button>
            <button>No</button>
        </div>
    </div>

    <div class="google-section">
        <div class="google-logo">
            <span style="color:#4285F4">G</span><span style="color:#EA4335">o</span><span style="color:#FBBC05">o</span><span style="color:#4285F4">g</span><span style="color:#34A853">l</span><span style="color:#EA4335">e</span>
        </div>
        <input type="text" class="search-bar" placeholder="Search Google or type a URL">
    </div>

    <div class="signup-form">
        <div class="name-row">
            <input type="text" placeholder="First name">
            <input type="text" placeholder="Last name">
        </div>
        <input type="text" class="full-width" placeholder="Email">
        <button class="signup-btn">Sign Up</button>
    </div>

    <div class="ride-widget">
        <h2>Request a ride now</h2>
        <input type="text" placeholder="Enter pickup location">
        <input type="text" placeholder="Enter destination">
        <div class="ride-buttons">
            <button class="btn-black">Request now</button>
            <button class="btn-grey">Schedule for later</button>
        </div>
    </div>

</div>

</body>
</html>

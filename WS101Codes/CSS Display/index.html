<!DOCTYPE html>
<html>
<head>
    <title>Lab Task 6 - Display Property</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            text-align: center;
        }

        .container{
            width: 700px;
            margin: 30px auto;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
        }

        h1{
            color: #2c3e50;
        }

        h2{
            color: #34495e;
        }

        hr{
            margin: 40px 0;
        }

        /* ===================== */
        /* TEXTBOXES - BLOCK */
        /* ===================== */
        .block-input{
            display: block;
            width: 300px;
            padding: 10px;
            margin: 10px auto;
            border-radius: 5px;
            border: 1px solid gray;
        }

        /* ===================== */
        /* PARAGRAPH + BUTTONS */
        /* ===================== */
        .survey-text{
            display: inline-block;
            width: 400px;
            vertical-align: middle;
        }

        .survey-btn{
            display: inline-block;
            padding: 8px 15px;
            margin-left: 5px;
            vertical-align: middle;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .yes{
            background-color: #27ae60;
            color: white;
        }

        .no{
            background-color: #e74c3c;
            color: white;
        }

        /* ===================== */
        /* GOOGLE SECTION */
        /* ===================== */
        .google-logo{
            width: 200px;
            margin: 20px 0;
        }

        .google-search{
            width: 400px;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid gray;
        }

        /* ===================== */
        /* SIGN UP FORM */
        /* ===================== */
        .signup-input{
            padding: 10px;
            margin: 5px;
            border-radius: 5px;
            border: 1px solid gray;
        }

        .email-input{
            display: block;
            width: 350px;
            margin: 10px auto;
        }

        .signup-btn{
            padding: 10px 25px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        /* ===================== */
        /* UBER FORM */
        /* ===================== */
        .uber-input{
            display: block;
            width: 400px;
            padding: 10px;
            margin: 10px auto;
            border-radius: 5px;
            border: 1px solid gray;
        }

        .uber-btn{
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .request{
            background-color: black;
            color: white;
        }

        .schedule{
            background-color: lightgray;
        }

    </style>
</head>

<body>

<div class="container">

<h1>Lab Task 6</h1>

<h2>Textboxes (Display: Block)</h2>

<input type="text" placeholder="Name" class="block-input">
<input type="email" placeholder="Email" class="block-input">

<br>

<h2>Paragraph and Buttons (Inline-Block)</h2>

<p class="survey-text">
    Thanks for chatting with our customer support.
    Would you like to take our quick survey?
</p>

<button class="survey-btn yes">Yes</button>
<button class="survey-btn no">No</button>

<hr>

<h1>Google Search Form</h1>

<img src="GOOGLE.png" alt="Google Logo" class="google-logo">

<br>

<input type="text" placeholder="Search Google or type a URL" class="google-search">

<hr>

<h1>Challenge Exercise 8d - Sign Up Form</h1>

<input type="text" placeholder="First Name" class="signup-input">
<input type="text" placeholder="Last Name" class="signup-input">

<input type="email" placeholder="Email" class="signup-input email-input">

<button class="signup-btn">Sign Up</button>

<hr>

<h1>Challenge Exercise 8e - Uber Request-a-Ride</h1>

<h2>Request a ride now</h2>

<input type="text" placeholder="Enter pickup location" class="uber-input">
<input type="text" placeholder="Enter destination" class="uber-input">

<button class="uber-btn request">Request now</button>
<button class="uber-btn schedule">Schedule for later</button>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Request for Proposal Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            color: #333;
        }

        .form-container {
            border: 1px solid #eee;
            padding: 20px;
            max-width: 600px;
        }

        h1 {
            color: #f3b404; /* Golden yellow */
            margin-bottom: 5px;
        }

        h2 {
            color: #2b78c5; /* Blue */
            font-size: 1.1em;
            margin-top: 0;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        td {
            padding: 5px;
            vertical-align: top;
        }

        .label-cell {
            text-align: right;
            width: 120px;
            padding-right: 15px;
        }

        input[type="text"],
        input[type="password"],
        textarea,
        select {
            width: 250px;
            border: 1px solid #767676;
            font-family: Arial, sans-serif;
        }

        textarea {
            height: 120px;
            padding: 5px;
        }

        .radio-group, .checkbox-group {
            display: inline-block;
        }

        .radio-option {
            display: block;
            margin-bottom: 3px;
        }

        button {
            margin-left: 135px;
            margin-top: 10px;
            padding: 2px 10px;
            background-color: #efefef;
            border: 1px solid #767676;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h1>How can we help?</h1>
    <h2>Request for Proposal</h2>

    <form action="#" method="post">
        <table>
            <tr>
                <td class="label-cell">Your name:</td>
                <td><input type="text" name="fullname"></td>
            </tr>
            <tr>
                <td class="label-cell">Email:</td>
                <td><input type="text" name="email"></td>
            </tr>
            <tr>
                <td class="label-cell">Username:</td>
                <td><input type="text" name="username"></td>
            </tr>
            <tr>
                <td class="label-cell">Password:</td>
                <td><input type="password" name="password"></td>
            </tr>

            <tr>
                <td class="label-cell">Your Business:</td>
                <td>
                    <textarea name="business_description">Briefly describe your business in this space</textarea>
                </td>
            </tr>

            <tr>
                <td class="label-cell">Company size:</td>
                <td>
                    <label class="radio-option"><input type="radio" name="size" value="10"> Less than 10</label>
                    <label class="radio-option"><input type="radio" name="size" value="50"> 11 to 50</label>
                    <label class="radio-option"><input type="radio" name="size" value="200"> 50 to 200</label>
                    <label class="radio-option"><input type="radio" name="size" value="over200"> Over 200</label>
                </td>
            </tr>

            <tr>
                <td class="label-cell">Service:</td>
                <td>
                    <label><input type="checkbox" name="service" value="brand"> Brand Identity</label>
                    <label><input type="checkbox" name="service" value="new_site"> New Website</label>
                    <label><input type="checkbox" name="service" value="redesign"> Web Redesigner</label>
                </td>
            </tr>

            <tr>
                <td class="label-cell">Timeline:</td>
                <td>
                    <select name="timeline">
                        <option value="immediately">Immediately</option>
                        <option value="1month">Within 1 month</option>
                        <option value="3months">1-3 months</option>
                    </select>
                </td>
            </tr>
        </table>

        <button type="submit">Send to dev\design</button>
    </form>
</div>

</body>
</html>
